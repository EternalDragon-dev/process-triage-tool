name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Correction loop smoke test
        run: |
          python correction_main.py \
            --processes-csv tests/data/processes.csv \
            --network-csv tests/data/network_connections.csv \
            --persistence-csv tests/data/persistence_artifacts.csv \
            --no-audit-events > /tmp/correction_report.json
